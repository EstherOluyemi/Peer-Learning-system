name: Sync Fork

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to fork
        env:
          FORK_REPO: ZeeksX/Peer-Learning-system
          FORK_SYNC_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          if [ -z "$FORK_SYNC_TOKEN" ]; then
            echo "Missing FORK_SYNC_TOKEN secret"
            exit 1
          fi

          git remote add fork "https://x-access-token:${FORK_SYNC_TOKEN}@github.com/${FORK_REPO}.git"

          # Sync all branches and tags to the fork
          git push fork --prune "refs/heads/*:refs/heads/*"
          git push fork --prune "refs/tags/*:refs/tags/*"
